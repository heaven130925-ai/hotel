<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel App — 호텔 관리자 등록</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #f0e6cc; font-family: 'Montserrat', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }

    .logo { font-size: 11px; letter-spacing: 3px; color: #c9a84c; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 300; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: #555; letter-spacing: 1px; margin-bottom: 40px; }

    .card { background: #141414; border: 1px solid #1e1e1e; border-radius: 20px; padding: 32px; width: 100%; max-width: 520px; margin-bottom: 20px; }
    .card-title { font-size: 10px; letter-spacing: 2px; color: #c9a84c; margin-bottom: 20px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 10px; letter-spacing: 1.5px; color: #555; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px;
      padding: 12px 14px; font-size: 13px; color: #f0e6cc; font-family: 'Montserrat', sans-serif;
      outline: none; transition: border 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color: #c9a84c; }
    select option { background: #1a1a1a; }
    textarea { resize: vertical; min-height: 80px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .plan-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    .plan-card {
      border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s;
    }
    .plan-card:hover { border-color: #c9a84c; }
    .plan-card.selected { border-color: #c9a84c; background: rgba(201,168,76,0.08); }
    .plan-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .plan-price { font-size: 18px; font-weight: 600; color: #c9a84c; margin-bottom: 8px; }
    .plan-features { font-size: 10px; color: #555; line-height: 1.8; }
    .plan-features span { display: block; }
    .plan-features .yes { color: #6a9a6a; }
    .plan-features .no { color: #444; text-decoration: line-through; }

    .submit-btn {
      width: 100%; max-width: 520px; background: linear-gradient(135deg, #c9a84c, #a8832a);
      border: none; border-radius: 14px; padding: 16px; font-size: 14px; font-weight: 500;
      color: #0d0d0d; cursor: pointer; letter-spacing: 0.5px; margin-top: 4px;
    }
    .submit-btn:hover { opacity: 0.9; }

    .success { display: none; background: #141414; border: 1px solid #1e1e1e; border-radius: 20px; padding: 40px; width: 100%; max-width: 520px; text-align: center; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success h2 { font-size: 20px; font-weight: 400; margin-bottom: 8px; }
    .success p { font-size: 12px; color: #555; margin-bottom: 24px; line-height: 1.8; }
    .qr-url { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; font-size: 11px; color: #c9a84c; word-break: break-all; margin-bottom: 20px; }
    .copy-btn { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 10px 20px; font-size: 11px; color: #f0e6cc; cursor: pointer; letter-spacing: 1px; }
  </style>
</head>
<body>

  <div class="logo">HOTEL APP</div>
  <h1>호텔 등록</h1>
  <p class="subtitle">게스트 앱을 무료로 시작하세요</p>

  <div id="form-section">

    <!-- 기본 정보 -->
    <div class="card">
      <div class="card-title">기본 정보</div>
      <div class="field">
        <label>호텔 이름</label>
        <input type="text" id="hotelName" placeholder="예: 그랜드 리조트 제주" />
      </div>
      <div class="field">
        <label>호텔 주소</label>
        <input type="text" id="hotelAddress" placeholder="예: 제주특별자치도 서귀포시..." />
      </div>
      <div class="row">
        <div class="field">
          <label>호텔 등급</label>
          <select id="hotelGrade">
            <option value="3">3성급</option>
            <option value="4">4성급</option>
            <option value="5">5성급</option>
            <option value="resort">리조트</option>
            <option value="motel">모텔</option>
          </select>
        </div>
        <div class="field">
          <label>대표 전화</label>
          <input type="tel" id="hotelPhone" placeholder="064-000-0000" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>체크인 시간</label>
          <input type="text" id="checkInTime" placeholder="15:00" />
        </div>
        <div class="field">
          <label>체크아웃 시간</label>
          <input type="text" id="checkOutTime" placeholder="11:00" />
        </div>
      </div>
      <div class="field">
        <label>호텔 소개 (선택)</label>
        <textarea id="hotelDesc" placeholder="호텔 소개를 간단히 입력해주세요..."></textarea>
      </div>
    </div>

    <!-- 담당자 정보 -->
    <div class="card">
      <div class="card-title">담당자 정보</div>
      <div class="field">
        <label>담당자 이름</label>
        <input type="text" id="managerName" placeholder="홍길동" />
      </div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="managerEmail" placeholder="manager@hotel.com" />
      </div>
    </div>

    <!-- 플랜 선택 -->
    <div class="card">
      <div class="card-title">플랜 선택</div>
      <div class="plan-grid">
        <div class="plan-card selected" id="plan-free" onclick="selectPlan('free')">
          <div class="plan-name">Free</div>
          <div class="plan-price">무료</div>
          <div class="plan-features">
            <span class="yes">✓ 기본 호텔 정보</span>
            <span class="yes">✓ 객실 가이드</span>
            <span class="yes">✓ 요청 접수</span>
            <span class="no">✗ AI 컨시어지</span>
            <span class="no">✗ AI 주변 검색</span>
            <span class="no">✗ 관리자 대시보드</span>
          </div>
        </div>
        <div class="plan-card" id="plan-pro" onclick="selectPlan('pro')">
          <div class="plan-name">Pro</div>
          <div class="plan-price">월 99,000원</div>
          <div class="plan-features">
            <span class="yes">✓ 기본 호텔 정보</span>
            <span class="yes">✓ 객실 가이드</span>
            <span class="yes">✓ 요청 접수</span>
            <span class="yes">✓ AI 컨시어지</span>
            <span class="yes">✓ AI 주변 검색</span>
            <span class="yes">✓ 관리자 대시보드</span>
          </div>
        </div>
      </div>
    </div>

    <button class="submit-btn" onclick="registerHotel()">호텔 등록하기</button>

  </div>

  <!-- 성공 화면 -->
  <div class="success" id="success-section">
    <div class="success-icon">✓</div>
    <h2>등록이 완료됐습니다!</h2>
    <p>아래 링크를 게스트에게 QR코드로 제공하세요.<br>게스트가 스캔하면 바로 앱이 열립니다.</p>
    <div class="qr-url" id="hotel-url"></div>
    <button class="copy-btn" onclick="copyUrl()">링크 복사</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBaL9gGEiLFLgb7cHg6gqdSEyVhy9z_nTY",
      authDomain: "hotel-app-f4a93.firebaseapp.com",
      projectId: "hotel-app-f4a93",
      storageBucket: "hotel-app-f4a93.firebasestorage.app",
      messagingSenderId: "285558698060",
      appId: "1:285558698060:web:50895111eaf0c6cd1344e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let selectedPlan = 'free';

    window.selectPlan = function(plan) {
      selectedPlan = plan;
      document.getElementById('plan-free').classList.toggle('selected', plan === 'free');
      document.getElementById('plan-pro').classList.toggle('selected', plan === 'pro');
    };

    window.registerHotel = async function() {
      const name = document.getElementById('hotelName').value.trim();
      const address = document.getElementById('hotelAddress').value.trim();
      const email = document.getElementById('managerEmail').value.trim();

      if (!name || !address || !email) {
        alert('호텔 이름, 주소, 이메일은 필수입니다.');
        return;
      }

      // 호텔 ID 생성 (이름 기반)
      const hotelId = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + Date.now().toString().slice(-4);

      const hotelData = {
        name,
        address,
        grade: document.getElementById('hotelGrade').value,
        phone: document.getElementById('hotelPhone').value,
        checkInTime: document.getElementById('checkInTime').value || '15:00',
        checkOutTime: document.getElementById('checkOutTime').value || '11:00',
        desc: document.getElementById('hotelDesc').value,
        managerName: document.getElementById('managerName').value,
        managerEmail: email,
        tier: selectedPlan,
        createdAt: new Date().toISOString()
      };

      try {
        await setDoc(doc(db, 'hotels', hotelId), hotelData);
        const url = `https://heaven130925-ai.github.io/hotel/?hotel=${hotelId}`;
        document.getElementById('hotel-url').textContent = url;
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
        window._registeredUrl = url;
      } catch(e) {
        alert('등록 중 오류가 발생했습니다. 다시 시도해주세요.');
        console.error(e);
      }
    };

    window.copyUrl = function() {
      navigator.clipboard.writeText(window._registeredUrl || '');
      alert('링크가 복사됐습니다!');
    };
  </script>

</body>
</html>
